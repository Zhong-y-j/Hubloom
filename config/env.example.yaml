# Hubloom 配置模板（可提交仓库）
# 用法：cp config/env.example.yaml config/env.yaml，再填入真实密钥
# 加载：HubloomConfig.from_file("config/env.yaml") → HubloomAgent.create(cfg)
# 占位符 "..." 表示必填时再替换；布尔开关省略时的行为见各段说明

# ---------------------------------------------------------------------------
# LLM：对话 / Assessor / Thought / Embedder（长期记忆与 RAG 入库共用 api_key）
# ---------------------------------------------------------------------------
llm:
  api_key: ... # OpenAI 兼容 API Key（必填）
  model: ... # 聊天模型名，如 qwen3-max / gpt-4o
  base_url: ... # API Base，兼容网关；缺省则用 SDK 默认
  timeout: 180 # 请求超时秒数（当前仅配置保留，未全部接到客户端）

# ---------------------------------------------------------------------------
# 记忆
# - 会话历史（SQLite conversation）始终开启，无开关可关
# - enable_long_term 才启用 Qdrant 情景/语义 + Neo4j 图谱
# ---------------------------------------------------------------------------
memory:
  db_path: data/memory.db # 会话历史 SQLite 路径（相对仓库根）
  enable_long_term: false # true=开长期记忆；false/省略=关（不连 qdrant/neo4j）
  consolidate_min_turns: 5 # 离线 worker 提炼：未处理 USER 轮数达到该值才写入长期记忆

# ---------------------------------------------------------------------------
# RAG：文档知识库检索（与长期记忆独立）
# 需 enable=true 且 docs 非空才会入库；仅写 docs、不写 enable 时也会因「有 docs」而开启
# ---------------------------------------------------------------------------
rag:
  enable: false # 是否启用文档 RAG
  kb_dir: data/knowledge_db # Chroma 等本地知识库持久化目录
  docs: '' # 逗号分隔的文件或目录；相对路径相对仓库根

# ---------------------------------------------------------------------------
# 日志：agent_log 为总闸；各通道未写则跟随总闸（总闸 true 时全开）
# ---------------------------------------------------------------------------
logging:
  agent_log: true # 总开关：cortex / a2a / memory / mcp 等结构化日志
  # cortex_log: true # 仅 ADP 编排层；省略则跟随 agent_log
  # a2a_log: true # 仅 A2A；省略则跟随 agent_log
  # memory_log: true # 仅记忆；省略则跟随 agent_log

# ---------------------------------------------------------------------------
# Qdrant：长期记忆向量后端（仅 enable_long_term=true 时使用）
# ---------------------------------------------------------------------------
qdrant:
  url: ... # Qdrant 服务地址
  api_key: ... # Qdrant Cloud / 鉴权 Key
  collection: ... # Collection 名
  no_proxy: 'localhost,127.0.0.1,.qdrant.io,qdrant.io,*.cloud.qdrant.io' # 代理绕过（若走系统代理）

# ---------------------------------------------------------------------------
# Neo4j：长期记忆图谱后端（仅 enable_long_term=true 时使用）
# ---------------------------------------------------------------------------
neo4j:
  uri: neo4j+s://... # bolt:// 或 neo4j+s:// Aura
  user: ... # 用户名
  password: ... # 密码
  database: ... # 库名
  skip_dns_check: true # true=跳过启动前 DNS 探测（常见于代理/Aura）

# ---------------------------------------------------------------------------
# MCP：Swagger → 工具。enable 省略时默认 true；为 true 时 swagger_url 必填
# 业务鉴权请用 session(token=...)，不要在本文件写用户 Token
# ---------------------------------------------------------------------------
mcp:
  enable: true # false=不加载 MCP 网关与工具
  swagger_url: ... # OpenAPI / Swagger JSON URL
  base_url: ... # 下游 API Base；省略则从 spec 推断
  auth_scheme: Bearer # Authorization 前缀，如 Bearer / JWT
  # 业务鉴权 Token 请用 session(token=...)，不要写在本文件

# ---------------------------------------------------------------------------
# A2A：跨 Agent 委托。不配 remote_agents 则 list_agents 为空（功能「关」）
# ---------------------------------------------------------------------------
a2a:
  # public_url: http://127.0.0.1:8001 # 对外公布的本 Agent Card URL（HTTP/A2A 挂载用）
  # remote_agents: # 可委托的远端 Agent 列表
  #   - id: hubloom-self # delegate_task 使用的 id
  #     name: Hubloom # 展示名
  #     url: http://127.0.0.1:8001 # 对端 Base URL（Agent Card）

# ---------------------------------------------------------------------------
# Skills：预留，当前运行时未消费；可先留空列表
# ---------------------------------------------------------------------------
skills: []
