<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache" />
    <title>Hubloom</title>
    <link rel="stylesheet" href="/static/styles.css?v=25" />
  </head>
  <body>
    <div class="layout">
      <aside class="sidebar">
        <div class="brand">
          <span class="brand-mark">◈</span>
          <div>
            <h1>Hubloom</h1>
            <p>会话接入</p>
          </div>
        </div>

        <div class="sidebar-intro">
          <ul>
            <li>模型与 Swagger 由服务端 <code>config/env.yaml</code> 加载，无需在页面填写。</li>
            <li>仅需业务 Token 与用户 ID；Token 只保存在本机浏览器。</li>
            <li>聊天记录会短期存储在服务端，用于会话上下文与历史回显。</li>
          </ul>
        </div>

        <section class="config-card">
          <h3 class="config-card-title">业务接入</h3>

          <div class="field">
            <label for="mcp-token"> Token </label>
            <input id="mcp-token" type="password" placeholder="业务 API access_token" autocomplete="off" />
          </div>

          <div class="field">
            <label for="session-id">用户 ID</label>
            <input id="session-id" type="text" placeholder="web-uuid" autocomplete="off" />
          </div>

          <button type="button" id="new-session" class="btn ghost">新会话</button>
        </section>

        <section class="panel-options">
          <label class="checkbox">
            <input id="stream-mode" type="checkbox" checked />
            流式输出（SSE）
          </label>
          <label class="checkbox">
            <input id="show-tools" type="checkbox" checked />
            显示工具调用
          </label>
        </section>

        <div class="status" id="status">就绪</div>
      </aside>

      <main class="chat">
        <header class="chat-header">
          <div class="chat-header-inner">
            <h2>OpenAPI 驱动的对话式 API 网关 — 自然语言操作企业 REST API</h2>
            <div class="chat-header-actions">
              <span id="route-badge" class="badge hidden"></span>
            </div>
          </div>
        </header>

        <div id="messages" class="messages" aria-live="polite"></div>

        <form id="chat-form" class="composer">
          <div class="composer-inner">
            <textarea id="message-input" rows="2" placeholder="输入消息，Enter 发送，Shift+Enter 换行" required></textarea>
            <button type="submit" id="send-btn" class="btn primary">发送</button>
          </div>
        </form>
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked@15/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
    <script src="/static/chat.js?v=27"></script>
  </body>
</html>
