<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>旅行景点系统 · 登录</title>
    <link rel="stylesheet" href="/static/login.css" />
  </head>
  <body>
    <main class="page">
      <section class="card">
        <header class="brand">
          <span class="brand-mark" aria-hidden="true">🏛️</span>
          <div>
            <h1>旅行景点系统</h1>
            <p>Hubloom 差旅演示 · 景区门票业务入口</p>
          </div>
        </header>

        <p class="intro">
          登录后可进入景点智能助手，用自然语言查询门票预约、入园政策与订单。
        </p>

        <form id="login-form" class="form" novalidate>
          <label class="field" for="username">
            <span>账号</span>
            <input
              id="username"
              name="username"
              type="text"
              value="HubloomAttraction"
              autocomplete="username"
              required
            />
          </label>

          <label class="field" for="password">
            <span>密码</span>
            <input
              id="password"
              name="password"
              type="password"
              value="HubloomAttraction@2026"
              autocomplete="current-password"
              required
            />
          </label>

          <button type="submit" class="btn" id="submit-btn">登录</button>
          <p class="error" id="error" role="alert"></p>
        </form>

        <footer class="hint">
          演示账号：<code>HubloomAttraction</code> / <code>HubloomAttraction@2026</code>
        </footer>
      </section>
    </main>

    <script src="/static/login.js"></script>
  </body>
</html>
