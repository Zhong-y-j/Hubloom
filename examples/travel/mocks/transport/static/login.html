<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>交通通行系统 · 登录</title>
    <link rel="stylesheet" href="/static/login.css" />
  </head>
  <body>
    <main class="page">
      <section class="card">
        <header class="brand">
          <span class="brand-mark" aria-hidden="true">🚄</span>
          <div>
            <h1>交通通行系统</h1>
            <p>Hubloom 差旅演示 · 高铁/动车业务入口</p>
          </div>
        </header>

        <p class="intro">
          登录后可进入交通智能助手，用自然语言查询行程、车次状态与订单。
        </p>

        <form id="login-form" class="form" novalidate>
          <label class="field" for="username">
            <span>账号</span>
            <input
              id="username"
              name="username"
              type="text"
              value="HubloomTransport"
              autocomplete="username"
              required
            />
          </label>

          <label class="field" for="password">
            <span>密码</span>
            <input
              id="password"
              name="password"
              type="password"
              value="HubloomTransport@2026"
              autocomplete="current-password"
              required
            />
          </label>

          <button type="submit" class="btn" id="submit-btn">登录</button>
          <p class="error" id="error" role="alert"></p>
        </form>

        <footer class="hint">
          演示账号：<code>HubloomTransport</code> / <code>HubloomTransport@2026</code>
        </footer>
      </section>
    </main>

    <script src="/static/login.js"></script>
  </body>
</html>
